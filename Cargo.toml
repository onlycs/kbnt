[package]
name = "kbnt"
version = "0.1.0"
edition = "2024"

[dependencies]
async-stream = "0.3.6"
compio = { version = "0.18.0", default-features = false, features = ["macros", "runtime"] }
crossbeam = { version = "0.8.4", features = ["crossbeam-channel"] }
flume = "0.12.0"
futures-util = "0.3.32"
serde = { version = "1.0.228", features = ["derive"] }
snafu = "0.8.9"
tauri-winrt-notification = "0.7.2"
wmi = "0.18.3"
