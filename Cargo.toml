[package]
name = "kbnt"
version = "0.1.0"
edition = "2024"

[dependencies]
cuid2 = "0.1.4"
frclib-nt4 = { git = "https://github.com/frclib-rs-group/frclib-nettables", version = "0.1.5" }
futures-util = "0.3.32"
serde = { version = "1.0.228", features = ["derive"] }
snafu = "0.8.9"
tauri-winrt-notification = "0.7.2"
tokio = { version = "1.49.0", features = ["macros", "rt", "rt-multi-thread"] }
wmi = "0.18.3"
